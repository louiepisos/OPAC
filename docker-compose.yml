services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opac-app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: opac_db
      DB_USERNAME: opac_user
      DB_PASSWORD: opac_password
    volumes:
      - .:/var/www/html
      - opac_vendor:/var/www/html/vendor
      - opac_node_modules:/var/www/html/node_modules
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: opac-db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: opac_db
      MYSQL_USER: opac_user
      MYSQL_PASSWORD: opac_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - opac_dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  opac_dbdata:
  opac_vendor:
  opac_node_modules:
